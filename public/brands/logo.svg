<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon mark (40x40, centred vertically) -->
  <g transform="translate(4, 4)">
    <!-- Outer ring -->
    <circle cx="20" cy="20" r="19" fill="#0A0A0F" stroke="#F59E0B" stroke-width="1.2"/>

    <!-- Crown base bar -->
    <rect x="9" y="26" width="22" height="3.5" rx="1.2" fill="#F59E0B"/>

    <!-- Crown left spike -->
    <polygon points="9,26 9,17 13.5,22" fill="#F59E0B"/>
    <!-- Crown centre spike (tallest) -->
    <polygon points="13.5,26 20,13 26.5,26" fill="#F59E0B"/>
    <!-- Crown right spike -->
    <polygon points="31,26 31,17 26.5,22" fill="#F59E0B"/>

    <!-- Left jewel (chip) -->
    <circle cx="10.5" cy="17.5" r="2" fill="#0A0A0F" stroke="#F59E0B" stroke-width="0.8"/>
    <circle cx="10.5" cy="17.5" r="0.8" fill="#F59E0B"/>

    <!-- Centre jewel (7) -->
    <circle cx="20" cy="12.5" r="2.6" fill="#0A0A0F" stroke="#F59E0B" stroke-width="0.9"/>
    <text x="20" y="13.6" text-anchor="middle" font-size="3.6" font-weight="900" fill="#F59E0B" font-family="Arial Black, Arial">7</text>

    <!-- Right jewel (chip) -->
    <circle cx="29.5" cy="17.5" r="2" fill="#0A0A0F" stroke="#F59E0B" stroke-width="0.8"/>
    <circle cx="29.5" cy="17.5" r="0.8" fill="#F59E0B"/>

    <!-- Chip dots on base -->
    <circle cx="13.5" cy="27.7" r="1" fill="#0A0A0F"/>
    <circle cx="20"   cy="27.7" r="1" fill="#0A0A0F"/>
    <circle cx="26.5" cy="27.7" r="1" fill="#0A0A0F"/>

    <!-- Slot reel strip below crown (three mini reels) -->
    <rect x="9" y="31" width="22" height="5" rx="1" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Reel dividers -->
    <line x1="16.3" y1="31" x2="16.3" y2="36" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="23.7" y1="31" x2="23.7" y2="36" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.4"/>
    <!-- Reel symbols: 7 |  | 7 -->
    <text x="12.6" y="35.5" text-anchor="middle" font-size="3.8" font-weight="900" fill="#F59E0B" font-family="Arial Black, Arial">7</text>
    <text x="20"   y="35.5" text-anchor="middle" font-size="3.2" fill="#F59E0B" font-family="Arial"></text>
    <text x="27.4" y="35.5" text-anchor="middle" font-size="3.8" font-weight="900" fill="#F59E0B" font-family="Arial Black, Arial">7</text>
  </g>

  <!-- Wordmark -->
  <text x="54" y="20" font-size="17" font-weight="900" fill="#F59E0B" font-family="Arial Black, Arial" letter-spacing="0.5">Casino</text>
  <text x="54" y="40" font-size="17" font-weight="900" fill="#ffffff" font-family="Arial Black, Arial" letter-spacing="0.5">Lords</text>

  <!-- Gold underline accent on "Lords" -->
  <rect x="54" y="42" width="62" height="2" rx="1" fill="#F59E0B" opacity="0.7"/>
</svg>
